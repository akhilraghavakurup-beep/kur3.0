name: Build

on:
    workflow_dispatch:
    push:
        branches: [main]
        paths-ignore:
            - '*.md'
            - 'docs/**'
    pull_request:
        branches: [main]
        paths-ignore:
            - '*.md'
            - 'docs/**'

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    build-android:
        name: Build Android Release APK
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 20
                  cache: 'npm'

            - name: Setup Java
              uses: actions/setup-java@v4
              with:
                  distribution: 'temurin'
                  java-version: '17'

            - name: Setup Android SDK
              uses: android-actions/setup-android@v3

            - name: Install dependencies
              run: npm ci

            - name: Generate native project
              run: npx expo prebuild --platform android --clean

            - name: Tune Gradle memory
              run: |
                  echo "org.gradle.jvmargs=-Xmx6g -XX:MaxMetaspaceSize=1g -Dkotlin.daemon.jvm.options=-Xmx2g" >> android/gradle.properties
                  echo "org.gradle.workers.max=2" >> android/gradle.properties
                  echo "org.gradle.parallel=false" >> android/gradle.properties
                  echo "android.useFullClasspathForDexingTransform=true" >> android/gradle.properties

            - name: Build Release APK
              working-directory: android
              run: ./gradlew --no-daemon assembleRelease -PreactNativeArchitectures=armeabi-v7a,arm64-v8a

            - name: Upload Release APK
              uses: actions/upload-artifact@v4
              with:
                  name: kurmusic-release
                  path: android/app/build/outputs/apk/release/app-release.apk
                  retention-days: 30

    build-summary:
        name: Build Summary
        runs-on: ubuntu-latest
        needs: [build-android]
        if: always()
        steps:
            - name: Build Summary
              run: |
                  echo "## Build Artifacts" >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY
                  echo "| Artifact | Platform | Description |" >> $GITHUB_STEP_SUMMARY
                  echo "|----------|----------|-------------|" >> $GITHUB_STEP_SUMMARY
                  echo "| kurmusic-release | Android | Release APK for distribution |" >> $GITHUB_STEP_SUMMARY
