name: Push Update (OTA)

on:
    workflow_dispatch:
        inputs:
            version:
                description: 'New Version (e.g. 4.5.0)'
                required: true
                type: string
            release_notes:
                description: 'Release Notes / Description'
                required: false
                type: string
                default: 'Bug fixes and performance improvements'

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: false

jobs:
    validate:
        name: Validate Release Version
        runs-on: self-hosted
        permissions:
            contents: write
        outputs:
            version: ${{ steps.version.outputs.version }}
        steps:
            - name: Checkout repository
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0
                  token: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract version
              id: version
              run: |
                  VERSION="${{ github.event.inputs.version }}"
                  VERSION="${VERSION#v}"
                  echo "version=$VERSION" >> $GITHUB_OUTPUT
                  echo "Pushing Update version: $VERSION"

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 20
                  cache: 'npm'

            - name: Bump version in config files
              run: |
                  VERSION="${{ steps.version.outputs.version }}"
                  # Update package.json
                  npm version "$VERSION" --no-git-tag-version --allow-same-version
                  # Update app.json
                  node -e "
                    const fs = require('fs');
                    const app = JSON.parse(fs.readFileSync('app.json', 'utf8'));
                    app.expo.version = '$VERSION';
                    fs.writeFileSync('app.json', JSON.stringify(app, null, 2) + '\n');
                  "
                  # Format modified files with Prettier
                  npx prettier --write app.json package.json
                  echo "Updated versions to $VERSION"

            - name: Commit version bump
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git add package.json package-lock.json app.json
                  git diff --staged --quiet || git commit -m "chore: bump version to ${{ steps.version.outputs.version }}"
                  git push

            - name: Install dependencies
              run: npm ci

            - name: Run quality checks
              run: |
                  npm run lint
                  npm run format:check
                  npx tsc --noEmit
                  npm run test:run

    build-android:
        name: Build Release APK
        runs-on: self-hosted
        needs: validate
        steps:
            - name: Checkout repository
              uses: actions/checkout@v6
              with:
                  ref: main

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 20
                  cache: 'npm'

            - name: Setup Java
              uses: actions/setup-java@v4
              with:
                  distribution: 'temurin'
                  java-version: '17'

            - name: Setup Android SDK
              uses: android-actions/setup-android@v3

            - name: Install Ninja
              run: |
                  if command -v ninja &> /dev/null; then
                    echo "Ninja already installed"
                    exit 0
                  fi
                  if command -v apt-get &> /dev/null; then
                    sudo apt-get update && sudo apt-get install -y ninja-build
                  elif command -v brew &> /dev/null; then
                    brew install ninja
                  fi

            - name: Install dependencies
              run: npm ci

            - name: Generate native project
              run: npx expo prebuild --platform android --clean

            - name: Build Release APK
              working-directory: android
              run: ./gradlew assembleRelease

            - name: Upload Release APK
              uses: actions/upload-artifact@v4
              with:
                  name: aria-${{ needs.validate.outputs.version }}-release
                  path: android/app/build/outputs/apk/release/app-release.apk
                  retention-days: 90

    create-release:
        name: Publish Release OTA
        runs-on: self-hosted
        needs: [validate, build-android]
        permissions:
            contents: write
        steps:
            - name: Checkout repository
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: Download Release APK
              uses: actions/download-artifact@v4
              with:
                  name: aria-${{ needs.validate.outputs.version }}-release
                  path: artifacts/release

            - name: Rename artifacts
              run: |
                  mv artifacts/release/app-release.apk artifacts/aria-${{ needs.validate.outputs.version }}-release.apk

            - name: Create GitHub Release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: v${{ needs.validate.outputs.version }}
                  name: Release v${{ needs.validate.outputs.version }}
                  body: |
                      ## Update Notes (OTA)

                      ${{ github.event.inputs.release_notes }}

                      ## Downloads

                      | File | Platform | Description |
                      |------|----------|-------------|
                      | `aria-${{ needs.validate.outputs.version }}-release.apk` | Android | Release APK |
                  files: |
                      artifacts/aria-${{ needs.validate.outputs.version }}-release.apk
                  draft: false
                  prerelease: false
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
