# =============================================================================
# Aria - Maestro Screenshot Flow
# =============================================================================
# This flow automates taking screenshots of the Aria app for store listings.
#
# Prerequisites:
#   - Install Maestro: curl -Ls "https://get.maestro.mobile.dev" | bash
#   - Android emulator running with app installed
#
# Usage:
#   maestro test scripts/screenshots/screenshot-flow.yaml
# =============================================================================

appId: com.aria.music.app

---
# Stop and relaunch the app (don't clear state to preserve any setup)
- stopApp
- launchApp

# Dismiss Expo developer menu if it appears (first launch shows Continue button)
- tapOn:
      text: 'Continue'
      optional: true

# Wait for app to fully initialize - look for Feed header (default tab)
- extendedWaitUntil:
      visible:
          text: 'Feed'
      timeout: 15000

# -----------------------------------------------------------------------------
# Step 1: Enable Screenshot Mode (load mock data)
# -----------------------------------------------------------------------------

# Settings is a standalone screen accessed via deep link (gear icon in header)
- openLink: 'aria://settings'
- waitForAnimationToEnd
- assertVisible: 'Settings'

# Scroll to find Developer section
- scroll
- scroll

# Tap Screenshot Mode to load mock data
- tapOn:
      text: 'Screenshot mode'
      optional: true

# Wait a moment for data to load
- waitForAnimationToEnd

# Go back to Feed tab
- back

# -----------------------------------------------------------------------------
# Step 2: Feed Screen (default landing screen)
# -----------------------------------------------------------------------------

- waitForAnimationToEnd
- takeScreenshot: '01_feed'

# -----------------------------------------------------------------------------
# Step 3: Library - Songs Tab
# -----------------------------------------------------------------------------

- tapOn: 'Library'
- waitForAnimationToEnd

# Take screenshot of Songs tab (default view)
- takeScreenshot: '02_library_songs'

# -----------------------------------------------------------------------------
# Step 4: Library - Albums Tab
# -----------------------------------------------------------------------------

- tapOn:
      text: 'Albums'
- waitForAnimationToEnd
- takeScreenshot: '03_library_albums'

# -----------------------------------------------------------------------------
# Step 5: Library - Artists Tab
# -----------------------------------------------------------------------------

- tapOn:
      text: 'Artists'
- waitForAnimationToEnd
- takeScreenshot: '04_library_artists'

# -----------------------------------------------------------------------------
# Step 6: Library - Playlists Tab
# -----------------------------------------------------------------------------

- tapOn:
      text: 'Playlists'
- waitForAnimationToEnd
- takeScreenshot: '05_library_playlists'

# -----------------------------------------------------------------------------
# Step 7: Playlist Detail Screen
# -----------------------------------------------------------------------------

- tapOn:
      text: 'Chill Vibes'
      optional: true
- waitForAnimationToEnd
- takeScreenshot: '06_playlist_detail'
- back

# -----------------------------------------------------------------------------
# Step 8: Downloads Screen
# -----------------------------------------------------------------------------

- tapOn: 'Downloads'
- waitForAnimationToEnd
- takeScreenshot: '07_downloads'

# -----------------------------------------------------------------------------
# Step 9: Player Screen - Play a track first
# -----------------------------------------------------------------------------

- tapOn: 'Library'
- waitForAnimationToEnd
- tapOn:
      text: 'Songs'

# Tap on a track to start playing
- tapOn:
      text: 'City Lights'
      optional: true
- waitForAnimationToEnd

- takeScreenshot: '08_player'

# Close player
- back
- waitForAnimationToEnd

# -----------------------------------------------------------------------------
# Step 10: Album Detail Screen
# -----------------------------------------------------------------------------

- tapOn:
      text: 'Albums'
- waitForAnimationToEnd
- tapOn:
      text: 'Neon Nights'
      optional: true
- waitForAnimationToEnd
- takeScreenshot: '09_album_detail'
- back

# -----------------------------------------------------------------------------
# Step 11: Artist Detail Screen
# -----------------------------------------------------------------------------

- tapOn:
      text: 'Artists'
- waitForAnimationToEnd
- tapOn:
      text: 'The Midnight Echo'
      optional: true
- waitForAnimationToEnd
- takeScreenshot: '10_artist_detail'
- back

# -----------------------------------------------------------------------------
# Step 12: Settings Screen
# -----------------------------------------------------------------------------

- openLink: 'aria://settings'
- waitForAnimationToEnd
- takeScreenshot: '11_settings'
